<?xml version="1.0" encoding="UTF-8"?>
<!-- Aura Media Group — Circular social avatar. Espresso fill, bronze halo, cream A. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%"  stop-color="#3A302A"/>
      <stop offset="100%" stop-color="#2D2620"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- halo rings -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#B0895A" stroke-width="1.4" opacity="0.30"/>
  <circle cx="100" cy="100" r="52" fill="none" stroke="#B0895A" stroke-width="2"   opacity="0.95"/>
  <circle cx="100" cy="100" r="41" fill="none" stroke="#B0895A" stroke-width="1.2" opacity="0.40"/>
  <circle cx="100" cy="48"  r="3.4" fill="#B0895A"/>

  <!-- the A in cream -->
  <line x1="81"  y1="128" x2="100" y2="80" stroke="#F7F1E8" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="119" y1="128" x2="100" y2="80" stroke="#F7F1E8" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="88"  y1="110" x2="112" y2="110" stroke="#F7F1E8" stroke-width="5.2" stroke-linecap="round"/>
</svg>
