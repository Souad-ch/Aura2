<?xml version="1.0" encoding="UTF-8"?>
<!-- Aura Media Group — Animated logo (SMIL). Concept: "Aura Halo" — an elegant A
     inside a bronze halo, with pulsing aura waves and an orbiting accent dot.
     Animations run when opened directly or embedded via <img>/<object>. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="60%">
      <stop offset="0%"  stop-color="#B0895A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B0895A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow behind emblem -->
  <circle cx="60" cy="60" r="50" fill="url(#halo)"/>

  <!-- pulsing aura waves -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#B0895A" stroke-width="1.4">
    <animate attributeName="r" values="34;56" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="40" fill="none" stroke="#B0895A" stroke-width="1.4">
    <animate attributeName="r" values="34;56" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- faint inner ring -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="#B0895A" stroke-width="1" opacity="0.32"/>

  <!-- main halo ring (draws in) -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#B0895A" stroke-width="1.8"
          stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9"
          transform="rotate(-90 60 60)">
    <animate attributeName="stroke-dashoffset" from="263.9" to="0" dur="1.2s" begin="0s" fill="freeze"/>
  </circle>

  <!-- orbiting accent dot -->
  <g>
    <circle cx="60" cy="18" r="2.8" fill="#B0895A"/>
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 60" to="360 60 60" dur="7s" repeatCount="indefinite"/>
  </g>

  <!-- the A (fades + rises in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      from="0 7" to="0 0" dur="0.8s" begin="0.5s" fill="freeze"/>
    <line x1="45" y1="80" x2="60" y2="42" stroke="#2D2620" stroke-width="4.2" stroke-linecap="round"/>
    <line x1="75" y1="80" x2="60" y2="42" stroke="#2D2620" stroke-width="4.2" stroke-linecap="round"/>
    <line x1="51" y1="66" x2="69" y2="66" stroke="#2D2620" stroke-width="4.2" stroke-linecap="round"/>
  </g>

  <!-- divider -->
  <line x1="126" y1="30" x2="126" y2="90" stroke="#B0895A" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.45" dur="0.6s" begin="1s" fill="freeze"/>
  </line>

  <!-- wordmark (fades in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="1.05s" fill="freeze"/>
    <text x="146" y="68" font-family="Montserrat, 'Arial Black', Arial, sans-serif"
          font-size="40" font-weight="800" fill="#2D2620" letter-spacing="7">AURA</text>
    <text x="147" y="88" font-family="Montserrat, Arial, sans-serif"
          font-size="11" font-weight="400" fill="#B0895A" letter-spacing="6">MEDIA GROUP</text>
  </g>
</svg>
