<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" width="360" height="110">
  <defs>
    <style>
      .wm-name {
        font-family: 'Montserrat', 'Arial Black', Arial, sans-serif;
        font-size: 40px;
        font-weight: 800;
        fill: #0F172A;
        letter-spacing: 7px;
      }
      .wm-sub {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 11px;
        font-weight: 400;
        fill: #D4B483;
        letter-spacing: 5.5px;
      }
    </style>
  </defs>

  <!-- ── Icon Mark (100×110 area) ── -->
  <!-- Outer aura arc -->
  <path d="M 17,34 A 33,33 0 0 0 83,34"
        fill="none" stroke="#D4B483" stroke-width="2"
        stroke-linecap="round" opacity="0.28"/>
  <!-- Middle aura arc -->
  <path d="M 26,34 A 24,24 0 0 0 74,34"
        fill="none" stroke="#D4B483" stroke-width="2.5"
        stroke-linecap="round" opacity="0.60"/>
  <!-- Inner aura arc -->
  <path d="M 36,34 A 14,14 0 0 0 64,34"
        fill="none" stroke="#D4B483" stroke-width="3"
        stroke-linecap="round" opacity="1"/>

  <!-- A — left leg -->
  <line x1="12" y1="92" x2="50" y2="34"
        stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  <!-- A — right leg -->
  <line x1="88" y1="92" x2="50" y2="34"
        stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  <!-- A — crossbar -->
  <line x1="31" y1="63" x2="69" y2="63"
        stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Divider ── -->
  <line x1="114" y1="18" x2="114" y2="92"
        stroke="#D4B483" stroke-width="1" opacity="0.45"/>

  <!-- ── Wordmark ── -->
  <text x="134" y="72" class="wm-name">AURA</text>
  <text x="135" y="90" class="wm-sub">MEDIA GROUP</text>
</svg>
